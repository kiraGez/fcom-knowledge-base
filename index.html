<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FCOM Knowledge Base - EFB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        :root {
            --efb-bg: #0a0a0a;
            --efb-panel: #141414;
            --efb-border: #2a2a2a;
            --efb-accent: #00bfff;
            --efb-accent-dim: #0088aa;
            --efb-text: #e0e0e0;
            --efb-text-dim: #888888;
            --efb-warning: #ffaa00;
            --efb-danger: #ff4444;
            --efb-success: #00ff88;
        }
        body { background: var(--efb-bg); color: var(--efb-text); font-family: 'Roboto Mono', 'Consolas', monospace; }
        .efb-panel { background: var(--efb-panel); border: 1px solid var(--efb-border); }
        .efb-input { background: #1a1a1a; border: 1px solid var(--efb-border); color: var(--efb-text); }
        .efb-input:focus { border-color: var(--efb-accent); outline: none; box-shadow: 0 0 10px rgba(0, 191, 255, 0.2); }
        .efb-btn { background: linear-gradient(180deg, #2a2a2a 0%, #1a1a1a 100%); border: 1px solid var(--efb-border); color: var(--efb-text); transition: all 0.2s; }
        .efb-btn:hover { border-color: var(--efb-accent); }
        .efb-btn-primary { background: linear-gradient(180deg, var(--efb-accent) 0%, var(--efb-accent-dim) 100%); border-color: var(--efb-accent); color: #000; font-weight: bold; }
        .scrollbar-efb::-webkit-scrollbar { width: 8px; }
        .scrollbar-efb::-webkit-scrollbar-track { background: var(--efb-bg); }
        .scrollbar-efb::-webkit-scrollbar-thumb { background: var(--efb-border); border-radius: 4px; }
        .section-header { color: var(--efb-accent); font-weight: bold; border-bottom: 1px solid var(--efb-border); padding-bottom: 0.5rem; margin-bottom: 0.5rem; }
        @keyframes pulse-glow { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
        .status-indicator { animation: pulse-glow 2s infinite; }
        .admin-panel { display: none; }
        .admin-panel.visible { display: flex; }
    </style>
</head>
<body class="min-h-screen">
    <div class="flex h-screen">
        <aside class="w-64 efb-panel flex flex-col">
            <div class="p-4 border-b border-[var(--efb-border)]">
                <h1 class="text-xl font-bold text-[var(--efb-accent)]">FCOM BASE</h1>
                <p class="text-xs text-[var(--efb-text-dim)]">Electronic Flight Bag</p>
            </div>
            <div class="p-4 border-b border-[var(--efb-border)]">
                <label class="block text-xs text-[var(--efb-text-dim)] mb-2">AIRCRAFT TYPE</label>
                <select id="aircraft-select" class="w-full efb-input px-3 py-2 rounded">
                    <option value="B777">Boeing 777</option>
                    <option value="A320">Airbus A320</option>
                    <option value="B737">Boeing 737</option>
                </select>
            </div>
            <div class="p-4 border-b border-[var(--efb-border)]">
                <label class="block text-xs text-[var(--efb-text-dim)] mb-2">MANUAL</label>
                <select id="manual-select" class="w-full efb-input px-3 py-2 rounded">
                    <option value="FCOM">Flight Crew Operations Manual</option>
                    <option value="FCTM">Flight Crew Training Manual</option>
                    <option value="QRH">Quick Reference Handbook</option>
                </select>
            </div>
            <div class="p-4 border-b border-[var(--efb-border)]">
                <div class="flex items-center gap-2">
                    <div id="status-indicator" class="w-3 h-3 rounded-full bg-[var(--efb-warning)] status-indicator"></div>
                    <span id="status-text" class="text-xs text-[var(--efb-text-dim)]">Loading...</span>
                </div>
                <div class="mt-2 text-xs text-[var(--efb-text-dim)]">Chunks: <span id="chunk-count">0</span></div>
            </div>
            <div class="mt-auto p-4">
                <button id="admin-toggle-btn" class="hidden w-full efb-btn px-3 py-2 rounded text-sm">Admin Panel</button>
            </div>
            <div class="p-4 border-t border-[var(--efb-border)]">
                <p class="text-xs text-[var(--efb-text-dim)]">Logged in as:</p>
                <p id="user-name" class="text-sm truncate">...</p>
            </div>
        </aside>
        
        <main class="flex-1 flex flex-col">
            <div class="p-6 efb-panel m-4 rounded-lg">
                <div class="flex gap-4">
                    <input type="text" id="query-input" class="flex-1 efb-input px-4 py-3 rounded-lg text-lg" placeholder="Ask about FCOM procedures, limitations, systems..." />
                    <button id="search-btn" class="efb-btn-primary px-6 py-3 rounded-lg">SEARCH</button>
                </div>
            </div>
            <div class="flex-1 p-4 overflow-hidden">
                <div id="results-panel" class="h-full efb-panel rounded-lg p-6 overflow-y-auto scrollbar-efb">
                    <div class="text-center text-[var(--efb-text-dim)] py-20">
                        <p class="text-2xl mb-2">✈️</p>
                        <p>Enter a query to search FCOM knowledge base</p>
                        <p class="text-sm mt-2">Example: "What is the maximum altitude?"</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <div id="admin-panel" class="admin-panel fixed inset-0 bg-black/80 z-50 items-center justify-center">
        <div class="efb-panel w-full max-w-4xl max-h-[90vh] overflow-y-auto scrollbar-efb rounded-lg m-4">
            <div class="p-6 border-b border-[var(--efb-border)] flex justify-between items-center">
                <h2 class="text-xl font-bold text-[var(--efb-accent)]">Admin Dashboard</h2>
                <button id="close-admin" class="efb-btn px-4 py-2 rounded">Close</button>
            </div>
            <div class="p-6">
                <div class="mb-6">
                    <h3 class="section-header">PDF Upload & Processing</h3>
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="block text-xs text-[var(--efb-text-dim)] mb-2">Aircraft Type</label>
                            <select id="upload-aircraft" class="w-full efb-input px-3 py-2 rounded">
                                <option value="B777">Boeing 777</option>
                                <option value="A320">Airbus A320</option>
                                <option value="B737">Boeing 737</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs text-[var(--efb-text-dim)] mb-2">Manual Type</label>
                            <select id="upload-manual" class="w-full efb-input px-3 py-2 rounded">
                                <option value="FCOM">FCOM</option>
                                <option value="FCTM">FCTM</option>
                                <option value="QRH">QRH</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="block text-xs text-[var(--efb-text-dim)] mb-2">PDF File</label>
                        <input type="file" id="pdf-file-input" accept=".pdf" class="w-full efb-input px-3 py-2 rounded" />
                    </div>
                    <button id="process-pdf-btn" class="efb-btn-primary px-6 py-3 rounded w-full">PROCESS PDF</button>
                </div>
                <div id="processing-status" class="hidden mb-6">
                    <h3 class="section-header">Processing Status</h3>
                    <div class="bg-[#1a1a1a] p-4 rounded">
                        <div class="flex items-center gap-2 mb-2">
                            <div id="process-spinner" class="w-4 h-4 border-2 border-[var(--efb-accent)] border-t-transparent rounded-full animate-spin"></div>
                            <span id="process-status-text">Processing...</span>
                        </div>
                        <div class="w-full bg-[var(--efb-border)] rounded h-2">
                            <div id="process-progress" class="bg-[var(--efb-accent)] h-2 rounded" style="width: 0%"></div>
                        </div>
                        <p id="process-details" class="text-xs text-[var(--efb-text-dim)] mt-2"></p>
                    </div>
                </div>
                <div class="mb-6">
                    <h3 class="section-header">Database Contents</h3>
                    <div id="db-contents" class="bg-[#1a1a1a] p-4 rounded max-h-60 overflow-y-auto scrollbar-efb">
                        <p class="text-[var(--efb-text-dim)]">Loading...</p>
                    </div>
                </div>
                <div class="flex gap-4">
                    <button id="refresh-db-btn" class="efb-btn px-4 py-2 rounded flex-1">Refresh Database</button>
                    <button id="clear-db-btn" class="efb-btn px-4 py-2 rounded flex-1 text-[var(--efb-danger)]">Clear Database</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        
        const ADMIN_USERNAME = 'kiraGez1';
        const MAX_CHUNK_SIZE = 35000; // ~35KB safe limit
        const INDEX_KEY = 'fcom_index';
        const CHUNK_PREFIX = 'fcom_';
        
        let isAdmin = false;
        let currentUser = null;
        
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                currentUser = await puter.auth.getUser();
                document.getElementById('user-name').textContent = currentUser?.username || 'Guest';
                isAdmin = currentUser?.username === ADMIN_USERNAME;
                if (isAdmin) document.getElementById('admin-toggle-btn').classList.remove('hidden');
                await loadDbStats();
                updateStatus('ready', 'Ready');
            } catch (e) {
                console.error('Init error:', e);
                updateStatus('ready', 'Ready (Guest)');
            }
            setupEventListeners();
        });
        
        function setupEventListeners() {
            document.getElementById('search-btn').addEventListener('click', performSearch);
            document.getElementById('query-input').addEventListener('keypress', e => { if (e.key === 'Enter') performSearch(); });
            document.getElementById('admin-toggle-btn').addEventListener('click', () => { document.getElementById('admin-panel').classList.add('visible'); loadDbContents(); });
            document.getElementById('close-admin').addEventListener('click', () => { document.getElementById('admin-panel').classList.remove('visible'); });
            document.getElementById('process-pdf-btn').addEventListener('click', processPdf);
            document.getElementById('refresh-db-btn').addEventListener('click', loadDbContents);
            document.getElementById('clear-db-btn').addEventListener('click', clearDatabase);
        }
        
        async function loadDbStats() {
            try {
                const indexData = await puter.kv.get(INDEX_KEY);
                const index = indexData ? JSON.parse(indexData) : {};
                let total = 0;
                for (const k in index) total += index[k].chunks?.length || 0;
                document.getElementById('chunk-count').textContent = total;
            } catch (e) { console.error('Stats error:', e); }
        }
        
        async function loadDbContents() {
            const el = document.getElementById('db-contents');
            try {
                const indexData = await puter.kv.get(INDEX_KEY);
                const index = indexData ? JSON.parse(indexData) : {};
                let html = '';
                for (const [k, m] of Object.entries(index)) {
                    html += `<div class="mb-2"><strong class="text-[var(--efb-accent)]">${m.aircraft} - ${m.manual}</strong>
                        <div class="text-sm text-[var(--efb-text-dim)]">${m.chunks?.length || 0} chunks, ${m.totalPages || '?'} pages</div></div>`;
                }
                el.innerHTML = html || '<p class="text-[var(--efb-text-dim)]">No documents indexed</p>';
            } catch (e) { el.innerHTML = `<p class="text-[var(--efb-danger)]">Error: ${e.message}</p>`; }
        }
        
        async function processPdf() {
            const fileInput = document.getElementById('pdf-file-input');
            const aircraft = document.getElementById('upload-aircraft').value;
            const manual = document.getElementById('upload-manual').value;
            if (!fileInput.files[0]) { alert('Please select a PDF file'); return; }
            
            const file = fileInput.files[0];
            document.getElementById('processing-status').classList.remove('hidden');
            updateProcessStatus('loading', 'Loading PDF...', 0);
            
            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                const totalPages = pdf.numPages;
                updateProcessStatus('loading', `PDF loaded: ${totalPages} pages`, 5);
                
                // Extract all pages
                const pages = [];
                for (let i = 1; i <= totalPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    const text = textContent.items.map(item => item.str).join(' ');
                    pages.push({ page: i, text });
                    updateProcessStatus('loading', `Extracting page ${i}/${totalPages}`, 5 + (i / totalPages) * 50));
                }
                
                // Chunk pages into safe-size chunks
                updateProcessStatus('loading', 'Chunking text...', 60);
                const chunks = [];
                let current = { pages: [], text: '', startPage: 1 };
                
                for (const p of pages) {
                    if (current.text.length + p.text.length > MAX_CHUNK_SIZE && current.text.length > 0) {
                        chunks.push({ ...current, endPage: current.pages[current.pages.length - 1] });
                        current = { pages: [p.page], text: p.text, startPage: p.page };
                    } else {
                        current.pages.push(p.page);
                        current.text += '\n' + p.text;
                    }
                }
                if (current.text.length > 0) chunks.push({ ...current, endPage: current.pages[current.pages.length - 1] });
                
                updateProcessStatus('loading', `Saving ${chunks.length} chunks...`, 70);
                
                // Load existing index
                let indexData = await puter.kv.get(INDEX_KEY);
                let index = indexData ? JSON.parse(indexData) : {};
                
                // Generate unique ID for this document
                const docId = `${aircraft}_${manual}_${Date.now()}`;
                const chunkKeys = [];
                
                // Save each chunk separately
                for (let i = 0; i < chunks.length; i++) {
                    const chunkKey = `${CHUNK_PREFIX}${docId}_${i}`;
                    await puter.kv.set(chunkKey, JSON.stringify(chunks[i]));
                    chunkKeys.push(chunkKey);
                    updateProcessStatus('loading', `Saving chunk ${i + 1}/${chunks.length}`, 70 + (i / chunks.length) * 25);
                }
                
                // Update index
                index[docId] = { aircraft, manual, chunks: chunkKeys, totalPages, createdAt: Date.now() };
                await puter.kv.set(INDEX_KEY, JSON.stringify(index));
                
                updateProcessStatus('success', `Done! ${chunks.length} chunks saved.`, 100);
                await loadDbStats();
                await loadDbContents();
            } catch (e) {
                console.error('Process error:', e);
                updateProcessStatus('error', `Error: ${e.message}`, 0);
            }
        }
        
        function updateProcessStatus(type, text, progress) {
            const spinner = document.getElementById('process-spinner');
            const statusText = document.getElementById('process-status-text');
            const progressBar = document.getElementById('process-progress');
            statusText.textContent = text;
            progressBar.style.width = progress + '%';
            if (type === 'success') { spinner.classList.remove('animate-spin'); spinner.style.borderColor = 'var(--efb-success)'; }
            if (type === 'error') { spinner.classList.remove('animate-spin'); spinner.style.borderColor = 'var(--efb-danger)'; }
        }
        
        async function clearDatabase() {
            if (!confirm('Clear entire database?')) return;
            try {
                const indexData = await puter.kv.get(INDEX_KEY);
                const index = indexData ? JSON.parse(indexData) : {};
                for (const docId in index) {
                    for (const chunkKey of index[docId].chunks || []) {
                        await puter.kv.del(chunkKey);
                    }
                }
                await puter.kv.del(INDEX_KEY);
                await loadDbStats();
                await loadDbContents();
                alert('Database cleared');
            } catch (e) { alert('Error: ' + e.message); }
        }
        
        async function performSearch() {
            const query = document.getElementById('query-input').value.trim();
            const aircraft = document.getElementById('aircraft-select').value;
            const manual = document.getElementById('manual-select').value;
            if (!query) return;
            
            const resultsPanel = document.getElementById('results-panel');
            resultsPanel.innerHTML = '<div class="flex items-center gap-2"><div class="w-4 h-4 border-2 border-[var(--efb-accent)] border-t-transparent rounded-full animate-spin"></div><span>Searching...</span></div>';
            
            try {
                const chunks = await searchDatabase(query, aircraft, manual);
                if (chunks.length === 0) {
                    resultsPanel.innerHTML = '<div class="text-center text-[var(--efb-text-dim)] py-10"><p>No relevant sections found</p><p class="text-sm mt-2">Try different keywords</p></div>';
                    return;
                }
                const answer = await queryAI(query, chunks);
                displayResults(answer, chunks);
            } catch (e) {
                console.error('Search error:', e);
                resultsPanel.innerHTML = `<div class="text-center text-[var(--efb-danger)] py-10"><p>Error: ${e.message}</p></div>`;
            }
        }
        
        async function searchDatabase(query, aircraft, manual) {
            const indexData = await puter.kv.get(INDEX_KEY);
            const index = indexData ? JSON.parse(indexData) : {};
            
            // Find matching document
            let docId = null;
            for (const id in index) {
                if (index[id].aircraft === aircraft && index[id].manual === manual) {
                    docId = id;
                    break;
                }
            }
            if (!docId) return [];
            
            const chunkKeys = index[docId].chunks || [];
            const queryWords = query.toLowerCase().split(/\s+/).filter(w => w.length > 2);
            
            // Load and score chunks
            const scored = [];
            for (const key of chunkKeys) {
                const chunkData = await puter.kv.get(key);
                if (!chunkData) continue;
                const chunk = JSON.parse(chunkData);
                const text = chunk.text.toLowerCase();
                let score = 0;
                queryWords.forEach(w => { score += (text.match(new RegExp(w, 'g')) || []).length; });
                if (score > 0) scored.push({ ...chunk, score, chunkKey: key });
            }
            
            return scored.sort((a, b) => b.score - a.score).slice(0, 5);
        }
        
        async function queryAI(query, chunks) {
            const context = chunks.map((c, i) => `[Page ${c.startPage}-${c.endPage || c.startPage}]\n${c.text.slice(0, 2000)}`).join('\n\n---\n\n');
            const systemPrompt = `You are an FCOM expert. Answer ONLY from provided context. Cite page numbers. Be precise.\n\nContext:\n${context}`;
            
            try {
                const response = await puter.ai.chat(query, { model: 'claude-3-5-sonnet', system: systemPrompt });
                return response.message?.content || response.toString();
            } catch (e) {
                // Fallback if AI fails
                return `AI query failed: ${e.message}\n\nRelevant pages: ${chunks.map(c => c.startPage).join(', ')}`;
            }
        }
        
        function displayResults(answer, chunks) {
            const resultsPanel = document.getElementById('results-panel');
            resultsPanel.innerHTML = `
                <div class="prose prose-invert max-w-none">
                    <div class="mb-6 p-4 bg-[#1a1a1a] rounded-lg border border-[var(--efb-border)]">
                        ${formatAnswer(answer)}
                    </div>
                    <h3 class="section-header">Source Sections</h3>
                    <div class="space-y-3">
                        ${chunks.map(c => `
                            <div class="p-3 bg-[#1a1a1a] rounded border border-[var(--efb-border)]">
                                <span class="text-[var(--efb-accent)] font-bold">Pages ${c.startPage}-${c.endPage || c.startPage}</span>
                                <p class="text-sm text-[var(--efb-text-dim)] mt-1">${c.text.slice(0, 300)}...</p>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
        }
        
        function formatAnswer(text) {
            return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                       .replace(/\n\n/g, '</p><p class="mt-3">')
                       .replace(/^/, '<p>')
                       .replace(/$/, '</p>');
        }
        
        function updateStatus(type, text) {
            const indicator = document.getElementById('status-indicator');
            const statusText = document.getElementById('status-text');
            indicator.className = 'w-3 h-3 rounded-full status-indicator';
            indicator.style.backgroundColor = type === 'ready' ? 'var(--efb-success)' : type === 'loading' ? 'var(--efb-warning)' : 'var(--efb-danger)';
            statusText.textContent = text;
        }
    </script>
</body>
</html>
